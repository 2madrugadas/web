<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2madrugadas</title>
  <link rel="icon" href="assets/logo.jpg" type="image/jpeg" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <header></header>

  <main id="admin-panel">
    <section id="github-config">
      <h2>Configuracion GitHub</h2>
      <div class="form-group">
        <label for="github-token">GitHub Token</label>
        <input type="password" id="github-token" />
        <button type="button" class="password-toggle" id="token-toggle">
          <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
        <button id="save-token-btn" class="admin-btn">Guardar Token</button>
      </div>
      <div id="token-status"></div>
    </section>

    <section id="admin-tabs">
      <button class="tab-btn active" data-tab="videos">Videos</button>
      <button class="tab-btn" data-tab="photos">Fotos</button>
      <button class="tab-btn" data-tab="essays">Ensayos</button>
    </section>

    <section id="admin-content">
      <div class="tab-content" id="photos-tab">
        <h2>Gestionar Fotos</h2>
        <form id="photo-form" class="admin-form">
          <div class="form-group">
            <label for="photo-title">Título</label>
            <input type="text" id="photo-title" name="title" required>
          </div>
          <div class="form-group">
            <label for="photo-date">Fecha</label>
            <input type="date" id="photo-date" name="date" required>
          </div>
          <div class="form-group">
            <label for="photo-link">Link</label>
            <input type="url" id="photo-link" name="link" required>
          </div>
          <div class="form-group">
            <label for="photo-description">Descripción</label>
            <textarea id="photo-description" name="description" rows="3"></textarea>
          </div>
          <button type="submit" class="admin-btn">Agregar Foto</button>
        </form>
        <div id="photos-list" class="admin-list"></div>
      </div>

      <div class="tab-content active" id="videos-tab">
        <h2>Gestionar Videos</h2>
        <form id="video-form" class="admin-form">
          <div class="form-group">
            <label for="video-title">Título</label>
            <input type="text" id="video-title" name="title" required>
          </div>
          <div class="form-group">
            <label for="video-date">Fecha</label>
            <input type="date" id="video-date" name="date" required>
          </div>
          <div class="form-group">
            <label for="video-link">Link</label>
            <input type="url" id="video-link" name="link" required>
          </div>
          <div class="form-group">
            <label for="video-description">Descripción</label>
            <textarea id="video-description" name="description" rows="3"></textarea>
          </div>
          <button type="submit" class="admin-btn">Agregar Video</button>
        </form>
        <div id="videos-list" class="admin-list"></div>
      </div>

      <div class="tab-content" id="essays-tab">
        <h2>Gestionar Ensayos</h2>
        <form id="essay-form" class="admin-form">
          <div class="form-group">
            <label for="essay-title">Título</label>
            <input type="text" id="essay-title" name="title" required>
          </div>
          <div class="form-group">
            <label for="essay-date">Fecha</label>
            <input type="date" id="essay-date" name="date" required>
          </div>
          <div class="form-group">
            <label for="essay-content">Contenido</label>
            <textarea id="essay-content" name="content" rows="10" required></textarea>
          </div>
          <button type="submit" class="admin-btn">Agregar Ensayo</button>
        </form>
        <div id="essays-list" class="admin-list"></div>
      </div>
    </section>
  </main>

  <footer>
    <p>
      <a href="https://www.instagram.com/2madrugadas/" class="footer-link" target="_blank">@2madrugadas</a>
    </p>
  </footer>

  <link rel="stylesheet" href="css/admin.css">
  <script type="module" src="js/admin.js"></script>
</body>
</html>
